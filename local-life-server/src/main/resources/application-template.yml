# ============================================
#  本地生活平台 — 配置文件模板
#  使用方法: 复制此文件为 application-dev.yml 并填写真实配置
#  注意: application*.yml 已在 .gitignore 中，不会提交到仓库
# ============================================

spring:
  application:
    name: local-life-platform
  profiles:
    active: dev

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/local_life?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: your-mysql-username
    password: your-mysql-password
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: your-rabbitmq-username
    password: your-rabbitmq-password
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# JWT
jwt:
  secret: change-me-to-a-random-string-at-least-256-bits
  ttl-hours: 168  # 7 days

# Aliyun OSS
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: local-life-platform

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  group-configs:
    - group: customer
      paths-to-match: /api/customer/**
    - group: merchant
      paths-to-match: /api/merchant/**
    - group: common
      paths-to-match: /api/common/**
